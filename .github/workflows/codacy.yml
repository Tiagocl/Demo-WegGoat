name: Codacy Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '40 16 * * 4'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@d840f886c4bd4edc059706d09c6a1586111c540b
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      - name: Split SARIF by run
        run: |
          mkdir -p sarif
          runs_count=$(jq '.runs | length' results.sarif)

          for i in $(seq 0 $((runs_count - 1))); do
            jq --argjson i "$i" '
              {
                version: .version,
                "$schema": ."$schema",
                runs: [ .runs[$i] ]
              }
            ' results.sarif > "sarif/run-$i.sarif"
          done

          ls -l sarif

      - name: Upload SARIF run 0
        if: hashFiles('sarif/run-0.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif/run-0.sarif
          category: codacy-run-0

      - name: Upload SARIF run 1
        if: hashFiles('sarif/run-1.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif/run-1.sarif
          category: codacy-run-1

      - name: Upload SARIF run 2
        if: hashFiles('sarif/run-2.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif/run-2.sarif
          category: codacy-run-2

      - name: Upload SARIF run 3
        if: hashFiles('sarif/run-3.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif/run-3.sarif
          category: codacy-run-3
